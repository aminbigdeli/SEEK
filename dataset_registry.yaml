version: 1
notes: >
  Dataset registry containing Pyserini index names, topic/qrels references,
  and BM25 weighting configurations for reproducible retrieval experiments.
  This file is specifically designed for Pyserini prebuilt indices and topics.

  Mirrored verbatim from QueryGym
  (https://github.com/ls3-lab/QueryGym/blob/main/dataset_registry.yaml)
  so single-shot results stay directly comparable to their leaderboard.

datasets:

################### MSMARCO Datasets ########################

  msmarco-v1-passage.dev:
    name: "MS MARCO v1 Passage — Dev"
    index:
      name: "msmarco-v1-passage"
    topics:
      name: "msmarco-v1-passage.dev"
    qrels:
      name: "msmarco-v1-passage.dev"
    bm25_weights:
      k1: 0.82
      b: 0.68
    output:
      runfile_template: "run.msmarco-v1-passage.bm25-default.dev.txt"
      eval_metrics: ["recip_rank", "recall.1000"]

  msmarco-v1-passage.trecdl2019:
    name: "TREC Deep Learning 2019 — Passage"
    index:
      name: "msmarco-v1-passage"
    topics:
      name: "dl19-passage"
    qrels:
      name: "dl19-passage"
    bm25_weights:
      k1: 0.9
      b: 0.4
    output:
      runfile_template: "run.msmarco-v1-passage.bm25-default.dl19.txt"
      eval_metrics: ["map", "ndcg_cut.10", "recall.1000"]

  msmarco-v1-passage.trecdl2020:
    name: "TREC Deep Learning 2020 — Passage"
    index:
      name: "msmarco-v1-passage"
    # Default: Pyserini bundled dl20 topics/qrels. To use local TREC files instead,
    # comment out `name` and set `file` (paths relative to repo root or absolute):
    topics:
      # name: "dl20-passage"
      file: /home/abigdeli/projects/query_reformulation/trecdl2020/original_queries.tsv
    qrels:
      # name: "dl20-passage"
      file: /home/abigdeli/projects/query_reformulation/trecdl2020/qrels.trec
    bm25_weights:
      k1: 0.9
      b: 0.4
    output:
      runfile_template: "run.msmarco-v1-passage.bm25-default.dl20.txt"
      eval_metrics: ["map", "ndcg_cut.10", "recall.1000"]

  # TREC DL-Hard: local queries + qrels (MS MARCO index). Run with:
  #   python scripts/run_eval.py --benchmark dl-hard
  dl-hard:
    name: "TREC DL Hard"
    index:
      name: "msmarco-v1-passage"
    topics:
      file: /home/abigdeli/projects/query_reformulation/dlhard/original_queries.tsv
    qrels:
      file: /home/abigdeli/projects/query_reformulation/dlhard/qrels.trec
    bm25_weights:
      k1: 0.9
      b: 0.4
    output:
      runfile_template: "run.msmarco-v1-passage.bm25-default.dl-hard.txt"
      eval_metrics: ["map", "ndcg_cut.10", "recall.1000"]

